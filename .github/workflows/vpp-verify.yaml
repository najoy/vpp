name: vpp-verify-build-and-test

on:
  # Commenting out workflow_run trigger for testing
  # workflow_run:
  #   workflows: ["vpp-checkstyle"]
  #   types:
  #     - completed
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual VPP Build and Test'

jobs:
  vpp-verify:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2-hour timeout for the entire job
    strategy:
      fail-fast: true
      matrix:
        # For testing: only ubuntu2404, master, x86_64
        os: [ubuntu2404]
        branch: [master]
        executor-arch: [x86_64]
        # Commented out for testing
        # os: [ubuntu2204, ubuntu2404, debian12]
        # branch: [master, stable/2502, stable/2506]
        # executor-arch: [x86_64, aarch64]
        # exclude:
        #   - branch: stable/2502
        #     os: ubuntu2204
        #   - branch: stable/2506
        #     os: ubuntu2204
        #   - executor-arch: aarch64
        #     os: debian12

    container:
      image: fdiotools/builder-${{ matrix.os }}:prod-${{ matrix.executor-arch }}
      options: --privileged -m24g

    env:
      # Ensures uniqueness per run
      CACHE_DATE: ${{ github.run_id }}
      STREAM: ${{ matrix.branch == 'master' && 'master' || matrix.branch == 'stable/2502' && '2502' || '2506' }}
      MAKE_PARALLEL_JOBS: ${{ matrix.executor-arch == 'aarch64' && '16' || '4' }}
      MAKE_TEST_OS: ${{ matrix.os == 'ubuntu2204' && 'ubuntu-22.04' || matrix.os == 'ubuntu2404' && 'ubuntu-24.04' || 'debian-12' }}
      MAKE_TEST_MULTIWORKER_OS: 'debian-12'
      VPPAPIGEN_TEST_OS: ${{ matrix.os == 'ubuntu2204' && 'ubuntu-22.04' || matrix.os == 'ubuntu2404' && 'ubuntu-24.04' || 'debian-12' }}
      OS: ${{ matrix.os }}
      EXECUTOR_ARCH: ${{ matrix.executor-arch }}
      GERRIT_BRANCH: ${{ matrix.branch }}
      BUILD_TIMEOUT: 120
      DOCKER_TEST: 1
      SHM_SIZE: ${{ matrix.executor-arch == 'aarch64' && '2048M' || '1024M' }}
      OS_ID: ${{ matrix.os == 'debian12' && 'debian' || 'ubuntu' }}
      OS_VERSION_ID: ${{ matrix.os == 'ubuntu2204' && '22.04' || matrix.os == 'ubuntu2404' && '24.04' || matrix.os == 'debian12' && '12' }}
      OS_ARCH: ${{ matrix.executor-arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Display platform fingerprint
        timeout-minutes: 1
        run: |
          uname -a
          lsb_release -a || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.os }}-${{ matrix.executor-arch }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.os }}-${{ matrix.executor-arch }}-
            ${{ runner.os }}-buildx-

      - name: Pull latest Docker image
        timeout-minutes: 5
        run: |
          docker pull fdiotools/builder-${{ matrix.os }}:prod-${{ matrix.executor-arch }}

      - name: Display injected environment variables
        timeout-minutes: 1
        run: |
          env | grep -E '^(OS|STREAM|EXECUTOR_ARCH|MAKE_|GERRIT_BRANCH|BUILD_TIMEOUT|DOCKER_TEST|SHM_SIZE|OS_ID|OS_VERSION_ID|OS_ARCH|VPPAPIGEN_TEST_OS)='

      - name: Setup workspace symlink
        timeout-minutes: 1
        run: |
          mkdir -p /tmp/workspace
          ln -s "$GITHUB_WORKSPACE" /tmp/workspace/vpp

      - name: Remount /dev/shm for Docker
        timeout-minutes: 1
        run: |
          sudo mount -o remount /dev/shm -o size=${SHM_SIZE} || true

      - name: Set working directory
        run: |
          cd /tmp/workspace/vpp
          echo "Switched to repo: $(pwd)"

      - name: Install VPP external dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          INSTALL_URL="https://packagecloud.io/install/repositories/fdio/${STREAM}"
          echo "Installing vpp-ext-deps from $INSTALL_URL"

          if [ "$OS_ID" = "ubuntu" ] || [ "$OS_ID" = "debian" ]; then
            if [ "$STREAM" != "master" ]; then
              sudo apt-get -y remove vpp-ext-deps || true
              sudo rm -f /etc/apt/sources.list.d/fdio_master.list
              curl -s $INSTALL_URL/script.deb.sh | sudo bash || true
            fi
            sudo apt-get update -qq || true
            sudo apt-get -y --allow-downgrades --allow-remove-essential --allow-change-held-packages install vpp-ext-deps || true
            sudo rm -f /etc/apt/sources.list.d/fdio_*.list
            sudo apt-get update -qq || true
          else
            echo "Unsupported OS: $OS_ID"
            exit 1
          fi

      - name: Install VPP build dependencies
        timeout-minutes: 15
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          make UNATTENDED=yes install-dep
          make UNATTENDED=yes install-ext-deps

      - name: Build static vppctl if present
        timeout-minutes: 5
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          echo "Building static vppctl if script exists"
          if [ -f extras/scripts/build_static_vppctl.sh ]; then
            extras/scripts/build_static_vppctl.sh
          else
            echo "No static vppctl script found. Skipping."
          fi

      - name: Install test dependencies
        timeout-minutes: 10
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          make UNATTENDED=yes test-dep

      - name: Package verification
        timeout-minutes: 10
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          make UNATTENDED=yes pkg-verify

      - name: Run vppapigen test (conditional)
        if: contains(env.VPPAPIGEN_TEST_OS, format('{0}-{1}', env.OS_ID, env.OS_VERSION_ID))
        timeout-minutes: 5
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          src/tools/vppapigen/test_vppapigen.py

      - name: Run make test
        if: contains(env.MAKE_TEST_OS, format('{0}-{1}', env.OS_ID, env.OS_VERSION_ID))
        timeout-minutes: 60
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          make COMPRESS_FAILED_TEST_LOGS=yes TEST_JOBS=${MAKE_PARALLEL_JOBS} RETRIES=3 test

      - name: Run multiworker tests (conditional)
        if: contains(env.MAKE_TEST_MULTIWORKER_OS, format('{0}-{1}', env.OS_ID, env.OS_VERSION_ID))
        timeout-minutes: 60
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/workspace/vpp
          if git grep -q VPP_WORKER_CONFIG ; then
            make VPP_WORKER_CONFIG="workers 2" COMPRESS_FAILED_TEST_LOGS=yes RETRIES=3 TEST_JOBS=${MAKE_PARALLEL_JOBS} test
          elif git grep -q VPP_WORKER_COUNT ; then
            make VPP_WORKER_COUNT="2" COMPRESS_FAILED_TEST_LOGS=yes RETRIES=3 TEST_JOBS=${MAKE_PARALLEL_JOBS} test
          else
            echo "No worker config found, skipping multiworker test"
          fi

      - name: Upload test results
        if: always()
        timeout-minutes: 5
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.branch }}-${{ matrix.executor-arch }}
          path: |
            /tmp/vpp-unittest/
            build-root/*.test.result
          retention-days: 5

      - name: Upload test logs
        if: failure()
        timeout-minutes: 5
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}-${{ matrix.branch }}-${{ matrix.executor-arch }}
          path: |
            /tmp/vpp-unittest/**/*.log
            build-root/test-failures/**
          retention-days: 5
